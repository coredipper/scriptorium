name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run scrip test suite (hermetic — no network, no LLM)
        working-directory: scrip
        run: uv run --locked pytest -q

      - name: Vault health — staleness, provenance, and facts must be clean
        run: |
          uv run --locked --project scrip scrip status --root .
          uv run --locked --project scrip scrip verify --root .
          uv run --locked --project scrip scrip query --sql "SELECT count(*) AS claims FROM claims" --root .
