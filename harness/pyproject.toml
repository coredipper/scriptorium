[project]
name = "scrip-harness"
version = "0.2.0"
description = "Runnable AGENT.md compile loop for scriptorium: drives `scrip` via subprocess + Claude. Not part of the deterministic scrip core."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "anthropic>=0.40",
    "scriptoria",
]

[project.scripts]
scrip-harness = "scrip_harness.cli:main"

[tool.uv.sources]
scriptoria = { path = "../scrip" }

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scrip_harness"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
