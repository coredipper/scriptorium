# Lint config for the whole repo (scrip, harness, adapters, scripts).
# Formatting is left to the author; CI runs `ruff check` only.
target-version = "py310"
line-length = 100

[lint]
# Defaults (E4/E7/E9 pycodestyle errors, F pyflakes) plus import order (I),
# modern-syntax upgrades for py310 (UP), and bugbear correctness checks (B).
select = ["E4", "E7", "E9", "F", "I", "UP", "B"]
